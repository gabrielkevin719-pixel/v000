(function() {
  'use strict';
  
  // Extrair subdomain da URL atual
  function getSubdomainFromHost() {
    // Primeiro, tentar buscar do data-attribute (mais confiável)
    const htmlSubdomain = document.documentElement.getAttribute('data-subdomain');
    if (htmlSubdomain) {
      return htmlSubdomain;
    }
    
    const host = window.location.hostname;
    // Remove www. se existir
    const cleanHost = host.replace(/^www\./, '');
    
    // Tenta extrair subdomain de padrões como: subdomain.vercel.app ou subdomain.clonup.site
    const vercelMatch = cleanHost.match(/^([^.]+)\.vercel\.app$/);
    if (vercelMatch) {
      return vercelMatch[1];
    }
    
    // Para outros padrões (.clonup.site, etc)
    const clonupMatch = cleanHost.match(/^([^.]+)\.clonup\.site$/);
    if (clonupMatch) {
      return clonupMatch[1];
    }
    
    // Fallback: usar o subdomain passado na geração do script
    return 'a';
  }
  
  // Verificar status do cliente
  async function checkClientStatus() {
    const subdomain = getSubdomainFromHost();
    if (!subdomain) {
      console.warn('[CloneStatus] Subdomain não encontrado');
      return null;
    }
    
    try {
      // Detectar URL da API automaticamente se possível
      let apiUrl = 'https://fastspeed.site/api/site-verify';
      
      // Se estiver no mesmo domínio (desenvolvimento), usar caminho relativo
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        apiUrl = '/api/site-verify';
      }
      
      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ subdomain }),
      });
      
      const data = await response.json();
      return data;
    } catch (error) {
      console.error('[CloneStatus] Erro ao verificar status:', error);
      return null;
    }
  }
  
  // Mostrar mensagem de bloqueio
  function showBlockedMessage(status) {
    const reason = status.message || 'Este site está temporariamente indisponível.';
    const subscriptionType = status.subscriptionType || 'none';
    
    // Determinar ícone e título baseado no tipo de erro
    let icon = '🔒';
    let title = 'Site Temporariamente Indisponível';
    
    if (reason.includes('não foi encontrado') || reason.includes('excluído')) {
      icon = '❌';
      title = 'Site Não Encontrado';
    } else if (reason.includes('assinatura expirou')) {
      icon = '⏰';
      title = 'Assinatura Expirada';
    } else if (reason.includes('trial expirou')) {
      icon = '⏱️';
      title = 'Período de Trial Expirado';
    } else if (reason.includes('não possui uma assinatura')) {
      icon = '💳';
      title = 'Assinatura Necessária';
    }
    
    // Esconder conteúdo original
    const body = document.body;
    
    // Criar overlay de bloqueio
    const overlay = document.createElement('div');
    overlay.id = 'clonup-status-overlay';
    overlay.style.cssText = `
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      animation: fadeIn 0.5s ease-in-out;
    `;
    
    overlay.innerHTML = `
      <style>
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        #clonup-status-overlay .icon {
          font-size: 80px;
          margin-bottom: 20px;
          animation: pulse 2s infinite;
        }
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.1); }
        }
        #clonup-status-overlay .title {
          font-size: 32px;
          margin-bottom: 20px;
          font-weight: 600;
        }
        #clonup-status-overlay .message {
          font-size: 18px;
          margin-bottom: 30px;
          opacity: 0.95;
          line-height: 1.7;
        }
        #clonup-status-overlay .support-box {
          background: rgba(255, 255, 255, 0.15);
          padding: 20px;
          border-radius: 10px;
          margin-top: 30px;
          backdrop-filter: blur(10px);
        }
        #clonup-status-overlay .support-link {
          color: white;
          text-decoration: underline;
          font-weight: 500;
        }
        #clonup-status-overlay .support-link:hover {
          opacity: 0.8;
        }
      </style>
      <div style="text-align: center; padding: 40px; max-width: 650px;">
        <div class="icon">${icon}</div>
        <h1 class="title">${title}</h1>
        <p class="message">
          ${reason}
        </p>
        <div class="support-box">
          <p style="font-size: 15px; margin-bottom: 10px; opacity: 0.9;">
            Precisa de ajuda?
          </p>
          <a href="https://clonup.pro/contato" target="_blank" class="support-link" style="font-size: 16px;">
            Entre em contato com o suporte
          </a>
        </div>
      </div>
    `;
    
    // Esconder body original e mostrar overlay
    body.style.overflow = 'hidden';
    body.innerHTML = '';
    body.appendChild(overlay);
    
    // Prevenir scroll
    document.documentElement.style.overflow = 'hidden';
  }
  
  // Restaurar conteúdo original
  function restoreContent() {
    const overlay = document.getElementById('clonup-status-overlay');
    if (overlay) {
      overlay.remove();
    }
    
    if (window._clonupOriginalContent) {
      document.body.innerHTML = window._clonupOriginalContent;
      delete window._clonupOriginalContent;
    }
    
    document.body.style.overflow = '';
  }
  
  // Executar verificação quando a página carregar
  async function init() {
    // Aguardar um pouco para não bloquear o carregamento
    await new Promise(resolve => setTimeout(resolve, 100));
    
    const status = await checkClientStatus();
    
    if (!status) {
      // Se não conseguir verificar, permitir acesso (fail-open para não bloquear em caso de erro)
      console.warn('[CloneStatus] Não foi possível verificar status, permitindo acesso');
      return;
    }
    
    if (!status.isActive) {
      // Cliente inativo - bloquear acesso
      showBlockedMessage(status);
    } else {
      // Cliente ativo - garantir que conteúdo está visível
      restoreContent();
    }
  }
  
  // Executar quando DOM estiver pronto
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
